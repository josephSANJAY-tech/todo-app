name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'          # ✅ Speeds up builds
    
    - name: Install dependencies
      run: npm install
    
    - name: Run tests
      run: npm test -- --watchAll=false --passWithNoTests   # ✅ Critical fix
      env:
        CI: true                                             # ✅ Tells React to not watch
    
    - name: Build application
      run: npm run build
      env:
        CI: false             # ✅ Prevents warnings from failing the build
    
    - name: Simulate random result
      run: |
        RANDOM_NUM=$((RANDOM % 5))
        if [ $RANDOM_NUM -eq 0 ]; then
          echo "❌ Pipeline failed - Simulating failure"
          exit 1
        else
          echo "✅ Pipeline succeeded"
        fi